backend:
  name: git-gateway
  branch: main

locale: sv

media_folder: public/assets
public_folder: /assets

collections:
  - name: settings
    label: Salonginställningar
    files:
      - label: Allmän info
        name: general
        file: content/settings.json
        format: json
        fields:
          - { label: Salongnamn, name: salon_name, widget: string }
          - { label: Rubrik (hero), name: tagline, widget: string }
          - { label: Beskrivning (hero), name: hero_subtitle, widget: text }
          - { label: Adress, name: address, widget: string }
          - { label: Telefon, name: phone, widget: string }
          - { label: E-post, name: email, widget: string }
          - { label: Bokningslänk, name: booking_url, widget: string }
          - { label: Hero-bild, name: hero_image, widget: image }

      - label: Öppettider
        name: hours
        file: content/hours.json
        format: json
        fields:
          - label: Öppettider
            name: hours
            widget: list
            fields:
              - { label: Dag, name: day, widget: string }
              - { label: Öppnar, name: open, widget: string, hint: "Format: 09:00" }
              - { label: Stänger, name: close, widget: string, hint: "Format: 18:00" }

      - label: Om oss
        name: about
        file: content/about.json
        format: json
        fields:
          - { label: Rubrik, name: heading, widget: string }
          - { label: Stycke 1, name: body, widget: text }
          - { label: Stycke 2, name: body2, widget: text }
          - { label: Stycke 3, name: body3, widget: text }
          - { label: Avslutning, name: closing, widget: text }

      - label: Tjänster & Priser
        name: services
        file: content/services.json
        format: json
        fields:
          - { label: Sektionsrubrik, name: section_heading, widget: string }
          - label: Klippning
            name: klippning
            widget: list
            fields:
              - { label: Namn, name: name, widget: string }
              - { label: Beskrivning, name: desc, widget: string, required: false }
              - { label: Pris, name: price, widget: string }
          - label: Skägg
            name: skagg
            widget: list
            fields:
              - { label: Namn, name: name, widget: string }
              - { label: Beskrivning, name: desc, widget: string, required: false }
              - { label: Pris, name: price, widget: string }
          - label: Övrigt
            name: ovrigt
            widget: list
            fields:
              - { label: Namn, name: name, widget: string }
              - { label: Beskrivning, name: desc, widget: string, required: false }
              - { label: Pris, name: price, widget: string }
          - label: Kombopaket
            name: kombo
            widget: list
            fields:
              - { label: Namn, name: name, widget: string }
              - { label: Beskrivning, name: desc, widget: string, required: false }
              - { label: Pris, name: price, widget: string }
          - { label: Fotnot, name: footnote, widget: string }

  - name: barbers
    label: Barberare
    folder: content/barbers
    format: json
    extension: json
    create: true
    slug: "{{name}}"
    identifier_field: name
    fields:
      - { label: Namn, name: name, widget: string }
      - { label: Titel, name: title, widget: string, default: Barberare }
      - { label: Specialitet, name: specialty, widget: string }
      - { label: Biografi, name: bio, widget: text }
      - { label: Porträttfoto, name: photo, widget: image }
      - { label: Aktionsfoto, name: action_photo, widget: image, required: false }
      - { label: Ordning (1 = först), name: order, widget: number, default: 1 }
